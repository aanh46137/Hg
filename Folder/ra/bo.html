<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: #eef1f5;
        }

        .review-box{

            width: 900px;

            background: white;

            margin: 20px auto;

            padding: 40px;

            border-radius: 20px;
        }

        .star{
            font-size: 40px;
            color: #ccc;
            cursor: pointer;
        }

    </style>

</head>
<body>

<div class="review-box">

    <h1 class="fw-bold text-primary">
        Viết đánh giá
    </h1>

    <h2 class="fw-bold text-primary mt-4">
        Đánh giá
    </h2>

    <div class="mb-4">

        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>

    </div>

    <form>

        <div class="mb-4">

            <label class="form-label fs-3 fw-bold text-primary">
                Tiêu đề
            </label>

            <input type="text"
                   class="form-control form-control-lg"
                   placeholder="Nhập tiêu đề đánh giá...">

        </div>

        <div class="mb-4">

            <label class="form-label fs-3 fw-bold text-primary">
                Nội dung đánh giá
            </label>

            <textarea class="form-control"
                      rows="6"
                      placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>

        </div>

        <button class="btn btn-primary btn-lg w-100">
            Gửi đánh giá
        </button>

    </form>

</div>

</body>
</html>
