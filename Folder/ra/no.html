<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Review</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body{
            background: #eef1f5;
        }

        .container{

            width: 900px;

            background: white;

            margin: 20px auto;

            padding: 40px;

            border-radius: 20px;
        }

        h1,h2{
            color: #0b3ea8;
            margin-bottom: 20px;
        }

        .stars{
            font-size: 40px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .form-group{
            margin-bottom: 30px;
        }

        label{

            display: block;

            font-size: 28px;

            font-weight: bold;

            color: #0b3ea8;

            margin-bottom: 10px;
        }

        input, textarea{

            width: 100%;

            padding: 15px;

            border: 1px solid #ccc;

            border-radius: 10px;

            font-size: 20px;
        }

        textarea{
            height: 180px;
        }

        button{

            width: 100%;

            padding: 18px;

            background: #2f6df6;

            color: white;

            border: none;

            border-radius: 10px;

            font-size: 28px;

            cursor: pointer;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Viết đánh giá</h1>

    <h2>Đánh giá</h2>

    <div class="stars">
        ★ ★ ★ ★ ★
    </div>

    <form>

        <div class="form-group">

            <label>Tiêu đề</label>

            <input type="text"
                   placeholder="Nhập tiêu đề đánh giá...">

        </div>

        <div class="form-group">

            <label>Nội dung đánh giá</label>

            <textarea placeholder="Chia sẻ trải nghiệm của bạn..."></textarea>

        </div>

        <button>
            Gửi đánh giá
        </button>

    </form>

</div>

</body>
</html>
