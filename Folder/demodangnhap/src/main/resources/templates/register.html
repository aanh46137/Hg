<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body style="background:#eef1f5;">

<div class="container mt-5">

    <div class="card p-4 mx-auto"
         style="max-width:500px;">

        <h1 class="text-center mb-4">
            Đăng ký
        </h1>

        <!-- Thông báo lỗi -->
        <div class="alert alert-danger"
             th:if="${error}"
             th:text="${error}">
        </div>

        <!-- Thành công -->
        <div class="alert alert-success"
             th:if="${success}"
             th:text="${success}">
        </div>

        <form th:action="@{/register}"
              method="post"
              th:object="${user}">

            <!-- Username -->
            <div class="mb-3">

                <label>Username</label>

                <input type="text"
                       class="form-control"
                       th:field="*{username}">

            </div>

            <!-- Email -->
            <div class="mb-3">

                <label>Email</label>

                <input type="email"
                       class="form-control"
                       th:field="*{email}">

            </div>

            <!-- Password -->
            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       class="form-control"
                       th:field="*{password}">

            </div>

            <button class="btn btn-primary w-100">
                Đăng ký
            </button>

        </form>

    </div>

</div>

</body>
</html>
