<!-- register.html -->
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #eef1f5;
      }

      .register-box {
        width: 500px;

        background: white;

        margin: 40px auto;

        padding: 40px;

        border-radius: 20px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .form-control {
        height: 55px;
      }

      .input-group-text {
        background: #f5f6f8;
      }

      .btn-register {
        height: 50px;

        font-size: 22px;

        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="register-box">
      <h1 class="text-center fw-bold">Đăng ký</h1>

      <p class="text-center text-secondary mb-4">Tạo tài khoản để bắt đầu</p>

      <!-- SUCCESS -->
      <div
        class="alert alert-success"
        th:if="${success}"
        th:text="${success}"
      ></div>

      <!-- ERROR -->
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <!-- FORM -->
      <form th:action="@{/register}" method="post" th:object="${user}">
        <!-- USERNAME -->
        <div class="mb-3">
          <label class="form-label"> Tên đăng nhập </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>

            <input
              type="text"
              class="form-control"
              placeholder="Nhập tên đăng nhập"
              th:field="*{username}"
              required
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
          <label class="form-label"> Mật khẩu </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>

            <input
              type="password"
              class="form-control"
              placeholder="Nhập mật khẩu"
              th:field="*{password}"
              required
            />

            <span class="input-group-text">
              <i class="bi bi-eye"></i>
            </span>
          </div>

          <small class="text-danger">
            Password phải có chữ hoa, chữ thường, số và ký tự đặc biệt
          </small>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label"> Email </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope"></i>
            </span>

            <input
              type="email"
              class="form-control"
              placeholder="Nhập email"
              th:field="*{email}"
              required
            />
          </div>
        </div>

        <!-- PHONE -->
        <div class="mb-4">
          <label class="form-label"> Số điện thoại </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-telephone"></i>
            </span>

            <input
              type="text"
              class="form-control"
              placeholder="Nhập số điện thoại"
              th:field="*{phone}"
              required
            />
          </div>
        </div>

        <!-- BUTTON -->
        <button class="btn btn-primary w-100 btn-register">Đăng ký</button>
      </form>

      <p class="text-center mt-4">
        Đã có tài khoản?

        <a href="#"> Đăng nhập </a>
      </p>
    </div>
  </body>
</html>
