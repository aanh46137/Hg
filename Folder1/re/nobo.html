<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>

    <!-- Icon -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body{
            background: #eef1f5;
        }

        .container{

            width: 500px;

            background: white;

            margin: 30px auto;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 0 10px rgba(0,0,0,0.1);

        }

        h1{
            text-align: center;
            margin-bottom: 10px;
        }

        .sub-title{
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        .form-group{
            margin-bottom: 25px;
        }

        label{
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .input-box{

            display: flex;

            align-items: center;

            border: 1px solid #ddd;

            border-radius: 10px;

            background: #f5f6f8;

            overflow: hidden;

        }

        .input-box i{
            padding: 18px;
            color: #444;
        }

        .input-box input{

            width: 100%;

            border: none;

            outline: none;

            background: transparent;

            padding: 18px;

            font-size: 18px;

        }

        .btn-register{

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #2f6df6;

            color: white;

            font-size: 22px;

            cursor: pointer;

        }

        .btn-register:hover{
            background: #1f5de0;
        }

        .login-text{
            text-align: center;
            margin-top: 30px;
        }

        .login-text a{
            color: blue;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Đăng ký</h1>

    <p class="sub-title">
        Tạo tài khoản để bắt đầu
    </p>

    <form>

        <!-- Username -->
        <div class="form-group">

            <label>Tên đăng nhập</label>

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input type="text"
                       placeholder="Nhập tên đăng nhập">

            </div>

        </div>

        <!-- Password -->
        <div class="form-group">

            <label>Mật khẩu</label>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       placeholder="Nhập mật khẩu">

                <i class="fa-regular fa-eye"></i>

            </div>

        </div>

        <!-- Email -->
        <div class="form-group">

            <label>Email</label>

            <div class="input-box">

                <i class="fa-regular fa-envelope"></i>

                <input type="email"
                       placeholder="Nhập email">

            </div>

        </div>

        <!-- Phone -->
        <div class="form-group">

            <label>Số điện thoại</label>

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input type="text"
                       placeholder="Nhập số điện thoại">

            </div>

        </div>

        <!-- Button -->
        <button class="btn-register">
            Đăng ký
        </button>

    </form>

    <p class="login-text">
        Đã có tài khoản?
        <a href="#">Đăng nhập</a>
    </p>

</div>

</body>
</html>
