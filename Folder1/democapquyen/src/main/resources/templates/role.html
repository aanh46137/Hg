<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cấp quyền</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #eef1f5;
      }

      .role-box {
        width: 950px;

        background: white;

        margin: 30px auto;

        padding: 35px;

        border-radius: 20px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .form-select,
      .form-control {
        height: 50px;
      }

      .btn-save {
        background: #0d6efd;

        color: white;

        border: none;

        padding: 10px 25px;

        border-radius: 8px;
      }

      .btn-cancel {
        background: gray;

        color: white;

        border: none;

        padding: 10px 25px;

        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="role-box">
      <h1 class="fw-bold mb-5">Cấp quyền người dùng</h1>

      <!-- SUCCESS -->
      <div
        class="alert alert-success"
        th:if="${success}"
        th:text="${success}"
      ></div>

      <!-- FORM -->
      <form th:action="@{/role}" method="post" th:object="${userRole}">
        <!-- USER -->
        <div class="mb-4">
          <label class="form-label fs-5"> Chọn người dùng </label>

          <select class="form-select" th:field="*{username}">
            <option value="">-- Chọn người dùng --</option>

            <option value="admin">admin</option>

            <option value="user01">user01</option>

            <option value="manager">manager</option>
          </select>
        </div>

        <!-- ROLE -->
        <div class="mb-4">
          <label class="form-label fs-5"> Vai trò </label>

          <select class="form-select" th:field="*{role}">
            <option value="Nhân viên">Nhân viên</option>

            <option value="Quản trị viên">Quản trị viên</option>
          </select>
        </div>

        <!-- PERMISSION -->
        <div class="mb-4">
          <label class="form-label fs-5"> Quyền hạn </label>

          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="permissions"
              value="Thêm sản phẩm"
            />

            <label class="form-check-label"> Thêm sản phẩm </label>
          </div>

          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="permissions"
              value="Sửa sản phẩm"
            />

            <label class="form-check-label"> Sửa sản phẩm </label>
          </div>

          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              name="permissions"
              value="Xóa sản phẩm"
            />

            <label class="form-check-label"> Xóa sản phẩm </label>
          </div>
        </div>

        <!-- STATUS -->
        <div class="mb-5">
          <label class="form-label fs-5"> Trạng thái tài khoản </label>

          <select class="form-select" th:field="*{status}">
            <option value="Hoạt động">Hoạt động</option>

            <option value="Khóa">Khóa</option>
          </select>
        </div>

        <!-- BUTTON -->
        <div class="text-end">
          <button type="reset" class="btn-cancel">Hủy</button>

          <button class="btn-save">Lưu quyền</button>
        </div>
      </form>
    </div>
  </body>
</html>
