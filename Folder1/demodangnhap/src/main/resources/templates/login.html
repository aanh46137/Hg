<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />

    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #eef1f5;
      }

      .login-box {
        width: 500px;

        background: white;

        margin: 40px auto;

        padding: 40px;

        border-radius: 20px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .form-control {
        height: 55px;
      }

      .btn-login {
        height: 50px;

        font-size: 22px;

        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h1 class="text-center fw-bold">Đăng nhập</h1>

      <p class="text-center text-secondary mb-4">Chào mừng quay trở lại</p>

      <!-- ERROR -->
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <!-- SUCCESS -->
      <div
        class="alert alert-success"
        th:if="${success}"
        th:text="${success}"
      ></div>

      <form th:action="@{/login}" method="post">
        <!-- USERNAME -->
        <div class="mb-3">
          <label class="form-label"> Username </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>

            <input
              type="text"
              class="form-control"
              name="username"
              placeholder="Nhập username"
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-4">
          <label class="form-label"> Password </label>

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>

            <input
              type="password"
              class="form-control"
              name="password"
              placeholder="Nhập password"
            />
          </div>
        </div>

        <button class="btn btn-primary w-100 btn-login">Đăng nhập</button>
      </form>
    </div>
  </body>
</html>
