<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color: #f2f2f2;
        }

        .modal-box{
            width: 700px;
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .btn-submit{
            background: #ff5722;
            color: white;
        }

        .btn-submit:hover{
            background: #e64a19;
            color: white;
        }

    </style>
</head>
<body>

<div class="modal-box">

    <h2 class="mb-4">Add User</h2>

    <form th:action="@{/save-user}" method="post" th:object="${user}">

       
        <div class="mb-3">
            <label class="form-label">
                <span class="text-danger">*</span> Username
            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{username}"
                   required>
        </div>

       
        <div class="mb-3">
            <label class="form-label">
                <span class="text-danger">*</span> Email
            </label>

            <input type="email"
                   class="form-control"
                   th:field="*{email}"
                   required>
        </div>

        
        <div class="mb-3">
            <label class="form-label">
                <span class="text-danger">*</span> Full Name
            </label>

            <input type="text"
                   class="form-control"
                   th:field="*{fullName}"
                   required>
        </div>

       
        <div class="mb-3">
            <label class="form-label">
                <span class="text-danger">*</span> Password
            </label>

            <input type="password"
                   class="form-control"
                   th:field="*{password}"
                   required>
        </div>

        
        <div class="mb-4">
            <label class="form-label">
                <span class="text-danger">*</span> Role
            </label>

            <select class="form-select"
                    th:field="*{role}">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

      
        <div class="text-end">

            <button type="reset"
                    class="btn btn-outline-secondary">
                Cancel
            </button>

            <button type="submit"
                    class="btn btn-submit">
                Submit
            </button>

        </div>

    </form>

</div>

</body>
</html>
